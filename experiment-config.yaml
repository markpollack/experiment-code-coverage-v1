      - coverage-mechanics/coverage-fundamentals.md
      - coverage-mechanics/jacoco-patterns.md
      - coverage-mechanics/spring-test-slices.md
  - name: variant-c
    promptFile: v2-with-kb.txt
    knowledgeDir: knowledge
    knowledgeFiles:
      - index.md
