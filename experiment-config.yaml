    promptFile: v0-naive.txt
    knowledgeDir: null
    knowledgeFiles: []
  - name: variant-a
    promptFile: v1-hardened.txt
    knowledgeDir: null
    knowledgeFiles: []
  - name: variant-b
    promptFile: v2-with-kb.txt
    knowledgeDir: knowledge
